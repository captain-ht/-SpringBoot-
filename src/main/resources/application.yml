server:
  port: 8081

spring:
  application:
    name: library-management-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/library_management?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5s
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: 8dQ4W2vR9sL1kP6xZ3mN0bH7cY5tF8gJ
  expiration: 7200000
  refresh-expiration: 604800000
  issuer: library-management-system

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.library: info
